name: API tests

on:
    push:
        branches:
            - main
        paths-ignore:
            - 'postman/**'
            - '**.md'
    pull_request:
        paths-ignore:
            - 'postman/**'
            - '**.md'
    schedule:
            - cron: '0 4 * * *'
            
jobs:
    run-tests:
        name: Run API tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
            checks: write

        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r python/requirements.txt
            
            - name: Run tests
              working-directory: python
              run: pytest -v   

            - name: Upload JUnit results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: junit-results
                path: python/reports/junit/results.xml

            - name: Test report
              if: always()
              uses: dorny/test-reporter@v2
              with:
                name: Test Results
                path: python/reports/junit/results.xml
                reporter: java-junit