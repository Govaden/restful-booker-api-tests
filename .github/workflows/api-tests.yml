name: API tests

on:
    push:
        branches:
            - main
        paths-ignore:
            - 'postman/**'
            - '**.md'
    pull_request:
        paths-ignore:
            - 'postman/**'
            - '**.md'
            
jobs:
    run-tests:
        name: Run API tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r python/requirements.txt
            
            - name: Run tests
              working-directory: python
              run: pytest -v   